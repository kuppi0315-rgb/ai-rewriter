<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜AIっぽい文章を自然な日本語に変換する無料ツール（レポート・ES対応）</title>

  <meta name="description" content="ChatGPTなどで生成したAIっぽい文章を自然な日本語に変換する無料ツール。レポート・ES提出前の最終仕上げに最適。">

  <!-- Google Search Console認証タグ -->
  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>AIリライター</h1>
    <p class="sub">提出前の最終仕上げツール</p>

    <div class="card">

      <select id="mode">
        <option value="normal">通常</option>
        <option value="report">レポート</option>
        <option value="casual">カジュアル</option>
      </select>

      <textarea id="input" placeholder="AIで生成した文章を貼ってね"></textarea>

      <button onclick="convert()">自然にする</button>
      <button class="secondary" onclick="strongConvert()">もっと自然にする</button>

      <div id="loading">変換中...</div>

      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <div id="score"></div>
      <div id="scoreBar"></div>

      <div id="reason"></div>

      <button onclick="copyText()">コピー</button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
