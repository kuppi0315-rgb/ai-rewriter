<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- 🔥SEOタイトル（生成AI主軸＋ChatGPT補助） -->
  <title>AIリライター｜生成AI（ChatGPTなど）文章を自然な日本語に修正する無料ツール（レポート・ES対応）</title>

  <meta name="description" content="AIリライターは生成AI（ChatGPTなど）で作成された文章を自然な日本語に変換する無料ツールです。レポート添削・ES文章修正・提出前チェックに対応しています。">

  <!-- Google Search Console認証 -->
  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>AIリライター</h1>

    <p class="sub">
      生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換
    </p>

    <!-- 🔥対応範囲バッジ -->
    <div class="mode-badges">
      <span class="badge">🧠 生成AI文章修正</span>
      <span class="badge">📄 レポート対応</span>
      <span class="badge">💼 ES対応</span>
    </div>

    <!-- 🧭モード選択（生成AIベース表現） -->
    <div class="mode-area">

      <label for="mode">変換モード</label>

      <select id="mode">
        <option value="normal">🧠 標準（生成AI文章を自然化）</option>
        <option value="report">📄 レポート（フォーマルに調整）</option>
        <option value="casual">💬 カジュアル（柔らかく自然に）</option>
        <option value="es">💼 ES・就活（丁寧で読みやすく）</option>
      </select>

    </div>

    <div class="card">

      <textarea id="input" placeholder="生成AI（ChatGPTなど）で作成した文章を貼ってね"></textarea>

      <button onclick="convert()">AIっぽさを減らす</button>
      <button class="secondary" onclick="strongConvert()">徹底的に自然化</button>

      <div id="loading">変換中...</div>

      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <div id="score"></div>
      <div id="scoreBar"></div>
      <div id="reason"></div>

      <button onclick="copyText()">コピー</button>

    </div>

    <!-- 🧠SEO説明ブロック（生成AI軸） -->
    <section class="seo-text">

      <h2>生成AI（ChatGPTなど）文章の自然化ツール</h2>

      <p>
        AIリライターは生成AI（ChatGPTなど）で作成された文章を自然な日本語に修正する無料ツールです。
        レポート添削やES文章修正、提出前チェックに対応しています。
      </p>

      <p>
        生成AIによる文章の不自然さを改善し、より読みやすく自然な文章へ変換できます。
      </p>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
