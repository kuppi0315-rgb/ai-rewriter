<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜生成AI（ChatGPTなど）文章を自然な日本語に修正する無料ツール</title>

  <meta name="description" content="生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換する無料ツール。レポート・ES・提出前チェックに対応。">

  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #f2f6ff;
      font-family: sans-serif;
    }

    .mode-badges span {
      display: inline-block;
      background: #fff;
      padding: 6px 10px;
      margin: 4px;
      border-radius: 8px;
      font-size: 12px;
    }

    .mode-btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin: 5px;
    }

    .mode-btn:hover {
      background: #eaeaea;
    }

    .mode-btn.active {
      background: #2b7cff;
      color: #000;
      border: none;
    }

    button {
      background-color: #2b7cff;
      color: #000;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button.secondary {
      background-color: #eee;
      color: #000;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>AIリライター</h1>

  <p class="sub">
    生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換
  </p>

  <!-- バッジ -->
  <div class="mode-badges">
    <span>🧠 生成AI対応</span>
    <span>📄 レポート対応</span>
    <span>💼 ES対応</span>
  </div>

  <!-- モード -->
  <div class="mode-area">

    <label>変換モード</label>

    <div>
      <button class="mode-btn active" onclick="setMode('normal')">標準</button>
      <button class="mode-btn" onclick="setMode('report')">レポート</button>
      <button class="mode-btn" onclick="setMode('casual')">カジュアル</button>
      <button class="mode-btn" onclick="setMode('es')">ES</button>
    </div>

  </div>

  <!-- 入力 -->
  <textarea id="input" placeholder="生成AI（ChatGPTなど）で作成した文章を貼ってください（レポート・ES対応）"></textarea>

  <button onclick="convert()">AIっぽさを減らす</button>
  <button class="secondary" onclick="strongConvert()">徹底的に自然化</button>

  <div id="loading">変換中...</div>

  <!-- Before / After -->
  <h3>変換前</h3>
  <div id="before"></div>

  <h3>変換後</h3>
  <div id="output"></div>

  <div id="score"></div>
  <div id="scoreBar"></div>
  <div id="reason"></div>

  <button onclick="copyText()">コピー</button>

</div>

<script src="script.js"></script>

<script>
  let mode = "normal";

  function setMode(m) {
    mode = m;

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.classList.remove("active");
    });

    event.target.classList.add("active");
  }
</script>

</body>
</html>
