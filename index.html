<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜ChatGPT文章を自然にする無料ツール（レポート・ES・カジュアル対応）</title>

  <meta name="description" content="AIリライターはChatGPTなどで生成したAIっぽい文章を自然な日本語に変換する無料ツールです。レポート・ES・カジュアル文章に対応しています。">

  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>AIリライター</h1>

    <p class="sub">
      レポート・ES・カジュアル文をワンタップで自然化
    </p>

    <!-- 🔥対応範囲バッジ（認知強化） -->
    <div class="mode-badges">
      <span class="badge">📄 レポート対応</span>
      <span class="badge">💬 カジュアル対応</span>
      <span class="badge">💼 ES対応</span>
    </div>

    <!-- 🧭モード選択（説明付きで直感化） -->
    <div class="mode-area">

      <label for="mode">変換モード</label>

      <select id="mode">
        <option value="normal">🧠 標準（バランスよく自然化）</option>
        <option value="report">📄 レポート（硬め・論文向け）</option>
        <option value="casual">💬 カジュアル（自然で柔らかく）</option>
        <option value="es">💼 ES・就活（読みやすく丁寧）</option>
      </select>

    </div>

    <div class="card">

      <textarea id="input" placeholder="ChatGPTで作成した文章を貼ってね"></textarea>

      <button onclick="convert()">AIっぽさを減らす</button>
      <button class="secondary" onclick="strongConvert()">徹底的に自然化</button>

      <div id="loading">変換中...</div>

      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <div id="score"></div>
      <div id="scoreBar"></div>
      <div id="reason"></div>

      <button onclick="copyText()">コピー</button>

    </div>

    <!-- 🧠SEO説明ブロック -->
    <section class="seo-text">

      <h2>レポート・ES・カジュアル文章の自然化に対応</h2>

      <p>
        AIリライターは、ChatGPTなどで生成されたAI文章を自然な日本語に修正する無料ツールです。
        レポート添削やES文章修正、日常的なカジュアル文章の調整にも対応しています。
      </p>

      <p>
        提出前の最終チェックとして、AIっぽさを減らし読みやすい文章に変換できます。
      </p>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
