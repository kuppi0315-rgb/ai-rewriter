<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜生成AI文章を自然な日本語に修正</title>

  <meta name="description" content="生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換する無料ツール">

  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>AIリライター</h1>

  <p class="sub">
    生成AIで作成した文章を自然な日本語に変換
  </p>

  <div class="card">

    <!-- 入力 -->
    <textarea id="input" placeholder="生成AI（ChatGPTなど）の文章を貼ってください"></textarea>

    <!-- ボタン -->
    <button onclick="convert()">変換</button>

    <!-- ローディング -->
    <div id="loading">変換中...</div>

    <!-- 出力 -->
    <h3>変換前</h3>
    <div id="before"></div>

    <h3>変換後</h3>
    <div id="output"></div>

    <!-- コピー（最初は隠す） -->
    <button id="copyBtn" onclick="copyText()" style="display:none;">
      コピー
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
