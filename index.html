<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>
    AIリライター｜ChatGPT・生成AI文章を自然な日本語に修正【無料】
  </title>

  <meta
    name="description"
    content="ChatGPT・生成AIで作成した文章を自然な日本語に変換する無料ツール。レポート・ES・カジュアル文章に対応。"
  >

  <meta
    name="google-site-verification"
    content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4"
  >

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- タイトル -->
    <h1>AIリライター</h1>

    <p class="sub">
      ChatGPT・生成AI文章を自然な日本語へ修正
    </p>

    <!-- SEO -->
    <h2 class="seo-title">
      レポート・ES・生成AI文章の自然化ツール
    </h2>

    <!-- モード説明 -->

    <p class="mode-guide">
      用途に合わせて4つの変換モードを選べます
    </p>

    <details class="feature-box">
      <summary>🟢 標準モード</summary>

      <p>
        ChatGPTなどの生成AIで作成した文章を、
        自然で読みやすい日本語へ変換します。
      </p>
    </details>

    <details class="feature-box">
      <summary>📄 レポートモード</summary>

      <p>
        大学レポート向けに、
        丁寧で論理的な文章へ調整します。
      </p>
    </details>

    <details class="feature-box">
      <summary>💼 ESモード</summary>

      <p>
        エントリーシートや自己PRを、
        読みやすく自然な表現へ整えます。
      </p>
    </details>

    <details class="feature-box">
      <summary>😊 カジュアルモード</summary>

      <p>
        SNSや会話向けに、
        柔らかく親しみやすい文章へ変換します。
      </p>
    </details>

    <!-- メイン -->
    <div class="card">

      <!-- モード -->
      <div class="mode-area">

        <p class="mode-label">
          変換モード
        </p>

        <div class="mode-select">

          <label class="mode-option">
            <input type="radio" name="mode" value="normal" checked>
            <span>標準</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="report">
            <span>レポート</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="es">
            <span>ES</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="casual">
            <span>カジュアル</span>
          </label>

        </div>

      </div>

      <!-- 入力 -->
      <textarea
        id="input"
        placeholder="ChatGPT・生成AIで作成した文章を貼ってください"
      ></textarea>

      <!-- ボタン -->
      <div class="button-area">

        <button onclick="convert()">
          変換
        </button>

      </div>

      <!-- ローディング -->
      <div id="loading">
        変換中...
      </div>

      <!-- 変換前 -->
      <h3>変換前</h3>

      <div id="before"></div>

      <div id="beforeScore"></div>

      <!-- 変換後 -->
      <h3>変換後</h3>

      <div id="output"></div>

      <div id="score"></div>

      <!-- スコアバー -->
      <div class="score-bar-bg">
        <div id="scoreBar"></div>
      </div>

      <!-- 改善 -->
      <div id="improveScore"></div>

      <!-- 理由 -->
      <div id="reason"></div>

      <!-- コピー -->
      <button
        id="copyBtn"
        onclick="copyText()"
        style="display:none;"
      >
        コピー
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
