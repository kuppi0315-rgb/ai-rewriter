<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- SEOタイトル（検索ワード寄せ済み） -->
  <title>AIリライター｜AI文章を自然な日本語に変換する無料ツール（レポート・ES提出前・ChatGPT対応）</title>

  <meta name="description" content="AIリライターは、ChatGPTなどで作成したAIっぽい文章を自然な日本語に変換する無料ツールです。レポート添削・ES文章修正・提出前チェックに対応。">

  <!-- Google Search Console 認証コード -->
  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>AIリライター</h1>
    <p class="sub">提出前の最終チェックツール</p>

    <div class="card">

      <select id="mode">
        <option value="normal">通常</option>
        <option value="report">レポート</option>
        <option value="casual">カジュアル</option>
      </select>

      <textarea id="input" placeholder="AIで生成した文章を貼ってね"></textarea>

      <button onclick="convert()">自然にする</button>
      <button class="secondary" onclick="strongConvert()">もっと自然にする</button>

      <div id="loading">変換中...</div>

      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <div id="score"></div>
      <div id="scoreBar"></div>

      <div id="reason"></div>

      <button onclick="copyText()">コピー</button>

      <!-- SEOキーワードブロック（検索対策） -->
      <section class="seo-text">

        <h2>AI文章修正・レポート添削・ES文章修正に対応</h2>

        <p>
          AIリライターは、AI 文章 修正やChatGPT 文章 自然化に対応した無料ツールです。
          レポート 添削やES 文章 修正の前に、文章をより自然な日本語へ変換できます。
        </p>

        <p>
          ChatGPTなどで作成した文章がAIっぽいと感じたときや、
          提出前の最終チェックとして利用できます。
        </p>

      </section>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
