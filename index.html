<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- SEOタイトル -->
  <title>
    AIリライター｜ChatGPT・生成AI文章を自然な日本語に修正【無料】
  </title>

  <!-- SEO説明 -->
  <meta
    name="description"
    content="ChatGPT・生成AIで作成した文章を自然な日本語に変換する無料ツール。レポート・ES・カジュアル文章の自然化に対応。"
  >

  <!-- Google認証 -->
  <meta
    name="google-site-verification"
    content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4"
  >

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- タイトル -->
    <h1>AIリライター</h1>

    <p class="sub">
      ChatGPT・生成AI文章を自然な日本語へ修正
    </p>

    <!-- SEO見出し -->
    <h2 class="seo-title">
      レポート・ES・生成AI文章の自然化ツール
    </h2>

    <div class="card">

      <!-- モード -->
      <div class="mode-area">

        <p class="mode-label">変換モード</p>

        <div class="mode-select">

          <label class="mode-option">
            <input type="radio" name="mode" value="normal" checked>
            <span>標準</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="report">
            <span>レポート</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="casual">
            <span>カジュアル</span>
          </label>

          <label class="mode-option">
            <input type="radio" name="mode" value="es">
            <span>ES</span>
          </label>

        </div>

      </div>

      <!-- 入力 -->
      <textarea
        id="input"
        placeholder="ChatGPT・生成AIで作成したレポートやES文章を貼ってください"
      ></textarea>

      <!-- ボタン -->
      <div class="button-area">

        <button onclick="convert()">
          変換
        </button>

      </div>

      <!-- ローディング -->
      <div id="loading">
        変換中...
      </div>

      <!-- 出力 -->
      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <!-- コピー -->
      <button
        id="copyBtn"
        onclick="copyText()"
        style="display:none;"
      >
        コピー
      </button>

    </div>

    <!-- SEOテキスト -->
    <div class="seo-text">

      <h2>
        生成AI（ChatGPTなど）の文章を自然な日本語に修正
      </h2>

      <p>
        AIリライターは、ChatGPTなどの生成AIで作成した文章を、
        より自然で読みやすい日本語へ変換する無料ツールです。
      </p>

      <h2>
        レポート・ES提出前の文章チェックに対応
      </h2>

      <p>
        大学レポートや就職活動のESなど、
        提出前に文章を自然化したい場面で利用できます。
      </p>

      <h2>
        AIっぽい文章を読みやすく自然化
      </h2>

      <p>
        「AI感がある」「少し不自然」と感じる文章を、
        読みやすく自然な日本語へ整えます。
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
