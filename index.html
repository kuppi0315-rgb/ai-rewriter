<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜生成AI（ChatGPTなど）文章を自然な日本語に修正する無料ツール</title>

  <meta name="description" content="生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換する無料ツール。レポート・ES・提出前チェックに対応。">

  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">

  <!-- 👇簡易スタイル（モード見やすくする） -->
  <style>
    .mode-area {
      margin: 15px 0;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .mode-btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .mode-btn:hover {
      background: #eaeaea;
    }

    .mode-btn.active {
      background: #2b7cff;
      color: white;
      border: none;
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>AIリライター</h1>

    <p class="sub">
      生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換
    </p>

    <!-- 🔥バッジ -->
    <div class="mode-badges">
      <span class="badge">🧠 生成AI対応</span>
      <span class="badge">📄 レポート対応</span>
      <span class="badge">💼 ES対応</span>
    </div>

    <!-- 🧭モード（ボタン化して視認性UP） -->
    <div class="mode-area">

      <label>変換モード</label>

      <div class="mode-buttons">

        <button class="mode-btn active" onclick="setMode('normal')">
          🧠 標準（自然化）
        </button>

        <button class="mode-btn" onclick="setMode('report')">
          📄 レポート（硬め）
        </button>

        <button class="mode-btn" onclick="setMode('casual')">
          💬 カジュアル
        </button>

        <button class="mode-btn" onclick="setMode('es')">
          💼 ES・就活
        </button>

      </div>

    </div>

    <div class="card">

      <!-- 🔥placeholder改善 -->
      <textarea id="input"
        placeholder="生成AI（ChatGPTなど）で作成した文章を貼ってください（レポート・ES・提出前チェック対応）"></textarea>

      <button onclick="convert()">AIっぽさを減らす</button>
      <button class="secondary" onclick="strongConvert()">徹底的に自然化</button>

      <div id="loading">変換中...</div>

      <h3>変換前</h3>
      <div id="before"></div>

      <h3>変換後</h3>
      <div id="output"></div>

      <div id="score"></div>
      <div id="scoreBar"></div>
      <div id="reason"></div>

      <button onclick="copyText()">コピー</button>

    </div>

  </div>

  <script src="script.js"></script>

  <!-- 🔥モード切替JS（最低限） -->
  <script>
    let mode = "normal";

    function setMode(m) {
      mode = m;

      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      event.target.classList.add("active");
    }
  </script>

</body>
</html>
