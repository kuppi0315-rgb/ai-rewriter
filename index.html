<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>AIリライター｜生成AI文章を自然な日本語に修正する無料ツール</title>

  <meta name="description" content="生成AI（ChatGPTなど）で作成した文章を自然な日本語に変換する無料ツール。レポート・ES・提出前チェックに対応。">

  <meta name="google-site-verification" content="yBGhlbyOhO3ESKcQlIhhgsZruC7BdkLmzDiIuU5-Wx4" />

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #f2f6ff;
      font-family: sans-serif;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .badge {
      display: inline-block;
      background: #fff;
      padding: 6px 10px;
      margin: 4px;
      border-radius: 8px;
      font-size: 12px;
    }

    .trust {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 14px;
    }

    .compare {
      display: flex;
      gap: 10px;
    }

    .box {
      flex: 1;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      min-height: 100px;
    }

    button {
      background: #2b7cff;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button.secondary {
      background: #eee;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    .cta-text {
      font-weight: bold;
      margin: 10px 0;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>AIリライター</h1>

  <p class="cta-text">
    「生成AIっぽい文章を、提出できる自然な文章に」
  </p>

  <!-- 🔥安心要素 -->
  <div class="trust">
    ✔ 無料で使えます<br>
    ✔ 登録不要ですぐ利用可能<br>
    ✔ レポート・ES・提出前チェック対応
  </div>

  <!-- バッジ -->
  <div>
    <span class="badge">🧠 生成AI対応</span>
    <span class="badge">📄 レポート</span>
    <span class="badge">💼 ES</span>
  </div>

  <!-- モード -->
  <h3>変換モード</h3>
  <select id="mode">
    <option>標準</option>
    <option>レポート</option>
    <option>カジュアル</option>
    <option>ES</option>
  </select>

  <!-- 入力 -->
  <textarea id="input" placeholder="生成AIで作成した文章を貼ってください（レポート・ES対応）"></textarea>

  <button onclick="convert()">AIっぽさを減らす</button>
  <button class="secondary" onclick="strongConvert()">徹底的に自然化</button>

  <div id="loading">変換中...</div>

  <!-- 🔥Before / After -->
  <h3>比較</h3>

  <div class="compare">

    <div class="box">
      <h4>変換前</h4>
      <div id="before"></div>
    </div>

    <div class="box">
      <h4>変換後</h4>
      <div id="output"></div>
    </div>

  </div>

  <div id="score"></div>
  <div id="scoreBar"></div>
  <div id="reason"></div>

  <button onclick="copyText()">コピー</button>

</div>

<script src="script.js"></script>

</body>
</html>
